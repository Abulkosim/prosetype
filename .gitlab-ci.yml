# CI order per plan §11: lint → typecheck → unit → integration (Postgres service) → e2e.
# Phase 0 runs lint → typecheck → unit only. Phase 2 adds:
#   - an `integration` stage with a `postgres:16` service container
#   - an `e2e` stage running the single Playwright smoke spec

image: node:24

stages:
  - lint
  - typecheck
  - test

default:
  before_script:
    - npm install -g pnpm@11.7.0
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store

lint:
  stage: lint
  script:
    - pnpm lint

typecheck:
  stage: typecheck
  script:
    - pnpm typecheck

unit:
  stage: test
  script:
    - pnpm test
