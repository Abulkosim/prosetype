name: Deploy

# CD: after CI succeeds on main, SSH into the production host and redeploy
# (git pull + compose rebuild). The migrate one-shot applies any new Drizzle
# migrations before the API restarts.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Never run two deploys at once; a second push waits for the first to finish.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 209.38.227.223 >> ~/.ssh/known_hosts

      - name: Pull and rebuild on server
        run: |
          ssh root@209.38.227.223 \
            "cd ~/prosetype && git pull --ff-only && docker compose -f deploy/docker-compose.yml up -d --build"
